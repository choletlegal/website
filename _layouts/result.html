---
layout: default
---

<div class="container-xxl py-5">
  <div class="row justify-content-center">
    <div class="col-md-12 col-lg-10 col-xl-8">
      <article>
        <div class="blog-header mb-4">
          <h1>{{ page.title }}</h1>
          {% include main/blog-meta.html %}
        </div>
        
        {% if page.lead %}
          <p class="lead">{{ page.lead | safe }}</p>
        {% endif %}
        
        <div class="content">
          {{ content }}
        </div>
      </article>
    </div>
  </div>
</div>
